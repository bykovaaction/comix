<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Комикс</title>
  <style>
    :root {
      --ink: #f7f2e8;
      --line: rgba(255, 255, 255, 0.14);
      --accent: #DCAA3F;
      --accent-2: #62d2c6;
      --danger: #ff7d68;
      --shadow: 0 22px 70px rgba(0, 0, 0, 0.38);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: #000;
      font-family: Inter, "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      letter-spacing: 0;
    }

    button {
      font: inherit;
    }

    .comic-app {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .reader {
      position: relative;
      width: min(1400px, 100%);
      min-height: 0;
      margin: 0 auto;
      display: grid;
      place-items: center;
    }

    .stage {
      position: relative;
      width: 100%;
      height: 820px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #000;
      box-shadow: var(--shadow);
      isolation: isolate;
    }

    .book-shell {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: clamp(10px, 2vw, 22px);
    }

    #book {
      width: 100%;
      height: 100%;
      min-width: 0 !important;
      min-height: 0 !important;
      max-width: 100% !important;
    }

    #book canvas {
      border-radius: 4px;
    }

    .page-btn {
      position: absolute;
      top: 50%;
      z-index: 10;
      width: 58px;
      height: 58px;
      margin-top: -29px;
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 50%;
      color: #000;
      background: var(--accent);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.38);
      cursor: pointer;
      transition: transform 0.15s ease, filter 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    }

    .page-btn::before {
      content: "";
      display: block;
      width: 0;
      height: 0;
    }

    .page-btn:hover {
      filter: brightness(1.08);
      box-shadow:
        0 0 0 3px rgba(220, 170, 63, 0.22),
        0 12px 30px rgba(0, 0, 0, 0.42);
    }

    .page-btn:active {
      transform: translateY(1px);
    }

    .page-btn:disabled {
      opacity: 0.32;
      cursor: default;
      transform: none;
    }

    .page-btn.prev {
      left: 14px;
    }

    .page-btn.prev::before {
      border-top: 12px solid transparent;
      border-bottom: 12px solid transparent;
      border-right: 18px solid #000;
      margin-left: -3px;
    }

    .page-btn.next {
      right: 14px;
    }

    .page-btn.next::before {
      border-top: 12px solid transparent;
      border-bottom: 12px solid transparent;
      border-left: 18px solid #000;
      margin-right: -3px;
    }

    .progress {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 4px;
      background: rgba(255, 255, 255, 0.12);
      z-index: 11;
    }

    .progress-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 0.24s ease;
    }

    .page-error {
      width: min(560px, calc(100% - 32px));
      padding: 22px;
      border: 1px dashed rgba(255, 255, 255, 0.28);
      border-radius: var(--radius);
      color: rgba(247, 242, 232, 0.78);
      background: rgba(255, 255, 255, 0.06);
      line-height: 1.5;
      text-align: center;
    }

    .page-error strong {
      display: block;
      color: var(--danger);
      margin-bottom: 6px;
    }

    @media (max-width: 860px) {
      .comic-app {
        padding: 12px;
      }

      .stage {
        height: min(820px, calc(100vh - 24px));
        min-height: 380px;
      }

      .book-shell {
        padding: 8px;
      }

      .page-btn {
        width: 50px;
        height: 50px;
        margin-top: -25px;
      }

      .page-btn.prev {
        left: 8px;
      }

      .page-btn.next {
        right: 8px;
      }
    }

    @media (max-width: 560px) {
      .stage {
        height: min(820px, calc(100vh - 24px));
        min-height: 360px;
      }

      .page-btn {
        width: 44px;
        height: 44px;
        margin-top: -22px;
      }

      .page-btn.prev::before {
        border-top-width: 10px;
        border-bottom-width: 10px;
        border-right-width: 15px;
      }

      .page-btn.next::before {
        border-top-width: 10px;
        border-bottom-width: 10px;
        border-left-width: 15px;
      }
    }
  </style>
</head>
<body>
  <main class="comic-app" aria-label="Интерактивный комикс">
    <section class="reader">
      <div class="stage" id="stage">
        <div class="book-shell">
          <div id="book" aria-live="polite"></div>
        </div>
        <button class="page-btn prev" type="button" id="prevBtn" aria-label="Предыдущая страница"></button>
        <button class="page-btn next" type="button" id="nextBtn" aria-label="Следующая страница"></button>
        <div class="progress" aria-hidden="true"><div class="progress-fill" id="progressFill"></div></div>
      </div>
    </section>
  </main>

  <script src="page-flip.browser.min.js"></script>
  <script>
    const pages = [
      { title: "Обложка", src: "Обложка.png" },
      { title: "Страница 1", src: "Page1.png" },
      { title: "Страница 2", src: "Page2.png" },
      { title: "Страница 3", src: "Page3.png" },
      { title: "Страница 4", src: "Page4.png" },
      { title: "Страница 5", src: "Page5.png" },
      { title: "Страница 6", src: "Page6.png" },
      { title: "Страница 7", src: "Page7.png" },
      { title: "Страница 8", src: "Page8.png" },
      { title: "Страница 9", src: "Page9.png" },
      { title: "Страница 10", src: "Page10.png" },
      { title: "Страница 11", src: "Page11.png" },
      { title: "Страница 12", src: "Page12.png" }
    ];

    const book = document.querySelector("#book");
    const progressFill = document.querySelector("#progressFill");
    const prevBtn = document.querySelector("#prevBtn");
    const nextBtn = document.querySelector("#nextBtn");

    let pageFlip = null;

    function updateProgress(pageIndex) {
      progressFill.style.width = `${((pageIndex + 1) / pages.length) * 100}%`;
      prevBtn.disabled = pageIndex === 0;
      nextBtn.disabled = pageIndex === pages.length - 1;
    }

    function showError(message) {
      book.innerHTML = `
        <div class="page-error">
          <strong>Не удалось запустить перелистывание</strong>
          ${message}
        </div>
      `;
    }

    function initBook() {
      if (!window.St || !window.St.PageFlip) {
        showError("Проверьте, что файл page-flip.browser.min.js лежит рядом с index.html.");
        return;
      }

      pageFlip = new St.PageFlip(book, {
        width: 1280,
        height: 750,
        size: "stretch",
        minWidth: 1280,
        maxWidth: 1280,
        minHeight: 188,
        maxHeight: 750,
        autoSize: false,
        showCover: true,
        drawShadow: true,
        maxShadowOpacity: 0.55,
        flippingTime: 850,
        usePortrait: true,
        mobileScrollSupport: true,
        swipeDistance: 30,
        clickEventForward: true
      });

      pageFlip.loadFromImages(pages.map((page) => page.src));
      pageFlip.on("flip", (event) => updateProgress(event.data));
      updateProgress(0);
    }

    prevBtn.addEventListener("click", () => {
      if (pageFlip) pageFlip.flipPrev("top");
    });

    nextBtn.addEventListener("click", () => {
      if (pageFlip) pageFlip.flipNext("top");
    });

    document.addEventListener("keydown", (event) => {
      if (!pageFlip) return;
      if (event.key === "ArrowRight" || event.key === " ") {
        event.preventDefault();
        pageFlip.flipNext("top");
      }
      if (event.key === "ArrowLeft") {
        event.preventDefault();
        pageFlip.flipPrev("top");
      }
    });

    initBook();
  </script>
</body>
</html>
